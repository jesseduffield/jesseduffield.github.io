---
layout: default
---

<p class="tag-page-heading">Tag</p>
<h1>{{ page.tag }}</h1>

<div class="posts">
  {% assign tagged_posts = site.posts | where: "tag", page.tag %}
  {% for post in tagged_posts %}
    {% if post.unlisted != true %}
      <article class="post">
        <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

        <div class="entry">
          {{ post.excerpt }}
        </div>

        <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
      </article>
    {% endif %}
  {% endfor %}
</div>
